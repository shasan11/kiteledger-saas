models:
  Branch:
    id: uuid primary
    code: string:30 unique
    name: string:120
    phone: string:40 nullable
    email: string:120 nullable
    address: text nullable
    is_head_office: boolean default:false
    is_transaction_enabled: boolean default:true
    is_pos_enabled: boolean default:true
    is_warehouse_enabled: boolean default:true
    is_ai_enabled: boolean default:true
    is_billing_location_enabled: boolean default:true
    abbreviated_tax_enabled: boolean default:true
    track_location: boolean default:true
    logo: string:255 nullable
    favicon: string:255 nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: ContactGroup, Contact, Account, BankAccount, ChartOfAccount, TaxClass, TaxRate, CreditTerm, ProductCategory, Variant, ProductUnit, Product, ProductVariant, Warehouse, CashTransfer, ChequeRegister, JournalVoucher, WarehouseTransfer, InventoryAdjustment, Quotation, SalesOrder, ProformaInvoice, Invoice, CustomerPayment, SalesReturn, PurchaseOrder, PurchaseBill, Expense, DebitNote, SupplierPayment, AlertType, ReportingTag, DocumentNumbering, PrintingTemplate, CustomTemplate, ApplicationSetting, GeneralSetting, MasterData

  Currency:
    id: uuid primary
    code: string:10 unique
    name: string:80
    symbol: string:20 nullable
    decimal_places: unsignedTinyInteger default:2
    is_base: boolean default:false
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: Account, BankAccount, ChartOfAccount, CashTransfer, JournalVoucher, Quotation, SalesOrder, ProformaInvoice, Invoice, CustomerPayment, SalesReturn, PurchaseOrder, PurchaseBill, Expense, DebitNote, SupplierPayment

  ContactGroup:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    name: string:120
    parent_id: uuid foreign:contact_groups.id nullable
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, ContactGroup:parent
      hasMany: Contact, ContactGroup:children

  Contact:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    contact_group_id: uuid foreign:contact_groups.id nullable
    account_id: uuid foreign:accounts.id nullable
    contact_type: enum:customer,supplier,lead default:customer
    name: string:180
    code: string:50 nullable
    address: text nullable
    pan: string:80 nullable
    phone: string:40 nullable
    email: string:120 nullable
    accept_purchase: boolean default:false
    credit_term_id: uuid foreign:credit_terms.id nullable
    credit_limit: decimal:16,2 default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, ContactGroup, Account, CreditTerm
      hasMany: Quotation, Invoice, SalesOrder, ProformaInvoice, CustomerPayment, SalesReturn, PurchaseOrder, PurchaseBill, Expense, DebitNote, SupplierPayment

  Account:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    name: string:120
    code: string:30 nullable
    nature: enum:actor,coa,bank,cash,employee default:coa
    parent_id: uuid foreign:accounts.id nullable
    currency_id: uuid foreign:currencies.id nullable
    description: text nullable
    bank_name: string:150 nullable
    account_name: string:150 nullable
    account_number: string:80 nullable
    account_type: string:50 nullable
    swift_code: string:50 nullable
    opening_balance: decimal:16,2 default:0
    dr_amount: decimal:16,2 default:0
    cr_amount: decimal:16,2 default:0
    balance: decimal:16,2 default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Account:parent, Currency
      hasMany: Account:children, Contact, BankAccount, ChartOfAccount, CashTransfer:from_transfers, CashTransferLine:to_transfer_lines, ChequeRegister:cheque_accounts, ChequeRegister:related_cheque_accounts, CustomerPayment, SupplierPayment

  BankAccount:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    type: enum:bank,cash
    display_name: string:150
    code: string:30
    currency_id: uuid foreign:currencies.id
    description: text nullable
    bank_name: string:150 nullable
    account_name: string:150 nullable
    account_number: string:80 nullable
    account_type: string:50 nullable
    swift_code: string:50 nullable
    account_id: uuid foreign:accounts.id nullable
    opening_balance: decimal:16,2 default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Currency, Account

  ChartOfAccount:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    account_id: uuid foreign:accounts.id
    code: string:30 unique
    name: string:150
    parent_id: uuid foreign:chart_of_accounts.id nullable
    description: text nullable
    currency_id: uuid foreign:currencies.id nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Account, ChartOfAccount:parent, Currency
      hasMany: ChartOfAccount:children, JournalVoucherLine, ExpenseLine, CustomerPayment:bank_charge_payments, CustomerPayment:tds_payments, SupplierPayment:bank_charge_payments, SupplierPayment:tds_payments

  CashTransfer:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    transfer_no: string:40 unique nullable
    transfer_date: date
    from_account_id: uuid foreign:accounts.id
    reference: string:120 nullable
    currency_id: uuid foreign:currencies.id
    total_amount: decimal:16,2 default:0
    notes: text nullable
    status: enum:draft,posted,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Account:from_account, Currency
      hasMany: CashTransferLine

  CashTransferLine:
    id: uuid primary
    cash_transfer_id: uuid foreign:cash_transfers.id
    to_account_id: uuid foreign:accounts.id
    exchange_rate_to_default: decimal:16,6 default:1
    amount: decimal:16,2 default:0
    description: string:200 nullable
    relationships:
      belongsTo: CashTransfer, Account:to_account

  ChequeRegister:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    cheque_no: string:80
    cheque_date: date
    issued_date: date
    received_date: date nullable
    payee_name: string:150 nullable
    cleared_date: date nullable
    direction: enum:issued,received default:issued
    account_id: uuid foreign:accounts.id
    related_account_id: uuid foreign:accounts.id nullable
    amount: decimal:16,2 default:0
    status: enum:pending,cleared,bounced,cancelled default:pending
    notes: text nullable
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Account:account, Account:related_account

  JournalVoucher:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    voucher_no: string:40 unique
    voucher_date: date
    currency_id: uuid foreign:currencies.id nullable
    reference: string:120 nullable
    narration: text nullable
    status: enum:draft,posted,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Currency
      hasMany: JournalVoucherLine

  JournalVoucherLine:
    id: uuid primary
    journal_voucher_id: uuid foreign:journal_vouchers.id
    chart_of_account_id: uuid foreign:chart_of_accounts.id
    description: string:200 nullable
    debit: decimal:16,2 default:0
    credit: decimal:16,2 default:0
    relationships:
      belongsTo: JournalVoucher, ChartOfAccount

  TaxClass:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    name: string:120
    code: string:30 unique
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch
      hasMany: TaxRate

  TaxRate:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    tax_class_id: uuid foreign:tax_classes.id
    name: string:120
    rate_percent: decimal:8,4 default:0
    inclusive: boolean default:false
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, TaxClass
      hasMany: QuotationLine, SalesOrderLine, ProformaInvoiceLine, InvoiceLine, SalesReturnLine, PurchaseOrderLine, PurchaseBillLine, ExpenseLine, DebitNoteLine

  CreditTerm:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    name: string:120
    days: unsignedSmallInteger default:0
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch
      hasMany: Contact, Quotation, PurchaseOrder

  ProductCategory:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    name: string:120
    parent_id: uuid foreign:product_categories.id nullable
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, ProductCategory:parent
      hasMany: ProductCategory:children, Product

  Variant:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    name: string:80
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch
      hasMany: VariantLine

  VariantLine:
    id: uuid primary
    variant_id: uuid foreign:variants.id
    value: string:80
    sort_order: unsignedSmallInteger default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    relationships:
      belongsTo: Variant
      hasMany: ProductVariantItem

  ProductUnit:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    name: string:50
    short_name: string:20 nullable
    precision: unsignedTinyInteger default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch
      hasMany: Product, ProductVariant

  Product:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    product_category_id: uuid foreign:product_categories.id nullable
    name: string:180
    code: string:60 nullable
    barcode: string:80 nullable
    description: text nullable
    product_unit_id: uuid foreign:product_units.id nullable
    tax_class_id: uuid foreign:tax_classes.id nullable
    track_inventory: boolean default:true
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, ProductCategory, ProductUnit, TaxClass
      hasMany: ProductVariant

  ProductVariant:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    product_id: uuid foreign:products.id
    name: string:180 nullable
    sku: string:80 nullable
    product_unit_id: uuid foreign:product_units.id nullable
    purchase_price: decimal:16,2 default:0
    selling_price: decimal:16,2 default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Product, ProductUnit
      hasMany: ProductVariantItem, QuotationLine, InvoiceLine, SalesOrderLine, ProformaInvoiceLine, SalesReturnLine, PurchaseOrderLine, PurchaseBillLine, DebitNoteLine, InventoryAdjustmentLine, WarehouseTransferLine

  ProductVariantItem:
    id: uuid primary
    product_variant_id: uuid foreign:product_variants.id
    variant_line_id: uuid foreign:variant_lines.id
    relationships:
      belongsTo: ProductVariant, VariantLine

  Warehouse:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    code: string:30 nullable
    name: string:150
    address: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch
      hasMany: WarehouseTransfer:from_transfers, WarehouseTransfer:to_transfers, InventoryAdjustment, Quotation, Invoice, SalesOrder, ProformaInvoice, SalesReturn, PurchaseOrder, PurchaseBill, DebitNote

  WarehouseTransfer:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    transfer_no: string:40 unique
    transfer_date: date
    from_warehouse_id: uuid foreign:warehouses.id
    to_warehouse_id: uuid foreign:warehouses.id
    notes: text nullable
    status: enum:draft,posted,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Warehouse:from_warehouse, Warehouse:to_warehouse
      hasMany: WarehouseTransferLine

  WarehouseTransferLine:
    id: uuid primary
    warehouse_transfer_id: uuid foreign:warehouse_transfers.id
    product_variant_id: uuid foreign:product_variants.id
    qty: decimal:16,4 default:0
    remarks: string:200 nullable
    relationships:
      belongsTo: WarehouseTransfer, ProductVariant

  InventoryAdjustment:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    adjustment_no: string:40 unique
    adjustment_date: date
    warehouse_id: uuid foreign:warehouses.id
    reason: string:150 nullable
    notes: text nullable
    status: enum:draft,posted,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Warehouse
      hasMany: InventoryAdjustmentLine

  InventoryAdjustmentLine:
    id: uuid primary
    inventory_adjustment_id: uuid foreign:inventory_adjustments.id
    product_variant_id: uuid foreign:product_variants.id
    adjustment_type: enum:increase,decrease default:increase
    qty: decimal:16,4 default:0
    unit_cost: decimal:16,2 default:0
    remarks: string:200 nullable
    active: boolean default:true
    relationships:
      belongsTo: InventoryAdjustment, ProductVariant

  Quotation:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    contact_id: uuid foreign:contacts.id
    quotation_no: string:40 unique nullable
    quotation_date: date
    expiry_date: date nullable
    credit_term_id: uuid foreign:credit_terms.id nullable
    currency_id: uuid foreign:currencies.id nullable
    notes: text nullable
    status: enum:draft,sent,accepted,rejected,expired,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Contact, CreditTerm, Currency
      hasMany: QuotationLine

  QuotationLine:
    id: uuid primary
    quotation_id: uuid foreign:quotations.id
    product_variant_id: uuid foreign:product_variants.id nullable
    product_name: string:180 nullable
    description: string:200 nullable
    qty: decimal:16,4 default:0
    unit_price: decimal:16,2 default:0
    discount_percent: decimal:8,4 default:0
    tax_rate_id: uuid foreign:tax_rates.id nullable
    tax_amount: decimal:16,2 default:0
    line_total: decimal:16,2 default:0
    relationships:
      belongsTo: Quotation, ProductVariant, TaxRate

  SalesOrder:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    sales_order_no: string:40 unique
    sales_order_date: date
    contact_id: uuid foreign:contacts.id
    warehouse_id: uuid foreign:warehouses.id nullable
    currency_id: uuid foreign:currencies.id nullable
    reference: string:120 nullable
    notes: text nullable
    subtotal: decimal:16,2 default:0
    discount_total: decimal:16,2 default:0
    tax_total: decimal:16,2 default:0
    grand_total: decimal:16,2 default:0
    status: enum:draft,confirmed,fulfilled,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Contact, Warehouse, Currency
      hasMany: SalesOrderLine

  SalesOrderLine:
    id: uuid primary
    sales_order_id: uuid foreign:sales_orders.id
    product_variant_id: uuid foreign:product_variants.id nullable
    custom_product_name: string:180 nullable
    description: string:200 nullable
    qty: decimal:16,4 default:0
    unit_price: decimal:16,2 default:0
    discount_percent: decimal:8,4 default:0
    tax_rate_id: uuid foreign:tax_rates.id nullable
    tax_amount: decimal:16,2 default:0
    line_total: decimal:16,2 default:0
    relationships:
      belongsTo: SalesOrder, ProductVariant, TaxRate

  ProformaInvoice:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    proforma_no: string:40 unique
    reference: string:120 nullable
    proforma_date: date
    contact_id: uuid foreign:contacts.id
    currency_id: uuid foreign:currencies.id nullable
    notes: text nullable
    status: enum:draft,issued,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Contact, Currency
      hasMany: ProformaInvoiceLine

  ProformaInvoiceLine:
    id: uuid primary
    proforma_invoice_id: uuid foreign:proforma_invoices.id
    product_variant_id: uuid foreign:product_variants.id nullable
    custom_product_name: string:180 nullable
    description: string:200 nullable
    qty: decimal:16,4 default:0
    unit_price: decimal:16,2 default:0
    discount_percent: decimal:8,4 default:0
    tax_rate_id: uuid foreign:tax_rates.id nullable
    tax_amount: decimal:16,2 default:0
    line_total: decimal:16,2 default:0
    relationships:
      belongsTo: ProformaInvoice, ProductVariant, TaxRate

  Invoice:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    invoice_no: string:40 unique
    invoice_date: date
    due_date: date nullable
    contact_id: uuid foreign:contacts.id
    warehouse_id: uuid foreign:warehouses.id nullable
    currency_id: uuid foreign:currencies.id nullable
    reference: string:120 nullable
    notes: text nullable
    paid_total: decimal:16,2 default:0
    balance_due: decimal:16,2 default:0
    export_country: string:80 nullable
    export_date: date nullable
    export_document_number: string:80 nullable
    status: enum:draft,posted,part_paid,paid,void default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Contact, Warehouse, Currency
      hasMany: InvoiceLine, CustomerPaymentLine

  InvoiceLine:
    id: uuid primary
    invoice_id: uuid foreign:invoices.id
    product_variant_id: uuid foreign:product_variants.id nullable
    custom_product_name: string:180 nullable
    description: string:200 nullable
    qty: decimal:16,4 default:0
    unit_price: decimal:16,2 default:0
    discount_percent: decimal:8,4 default:0
    tax_rate_id: uuid foreign:tax_rates.id nullable
    tax_amount: decimal:16,2 default:0
    line_total: decimal:16,2 default:0
    relationships:
      belongsTo: Invoice, ProductVariant, TaxRate

  CustomerPayment:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    payment_no: string:40 unique
    payment_date: date
    contact_id: uuid foreign:contacts.id
    account_id: uuid foreign:accounts.id nullable
    currency_id: uuid foreign:currencies.id nullable
    amount: decimal:16,2 default:0
    payment_method: string:20 nullable
    bank_charges_account_id: uuid foreign:chart_of_accounts.id nullable
    bank_charges: decimal:16,2 default:0
    tds_charges_account_id: uuid foreign:chart_of_accounts.id nullable
    tds_type: string:20 nullable
    tds_charges: decimal:16,2 default:0
    reference: string:120 nullable
    notes: text nullable
    status: enum:draft,posted,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Contact, Account, Currency, ChartOfAccount:bank_charges_account, ChartOfAccount:tds_charges_account
      hasMany: CustomerPaymentLine

  CustomerPaymentLine:
    id: uuid primary
    customer_payment_id: uuid foreign:customer_payments.id
    invoice_id: uuid foreign:invoices.id
    allocated_amount: decimal:16,2 default:0
    relationships:
      belongsTo: CustomerPayment, Invoice

  SalesReturn:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    sales_return_no: string:40 unique
    sales_return_date: date
    contact_id: uuid foreign:contacts.id
    warehouse_id: uuid foreign:warehouses.id nullable
    currency_id: uuid foreign:currencies.id nullable
    reference: string:120 nullable
    notes: text nullable
    status: enum:draft,posted,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
