models:
  # ============================================================
  # MASTER / SETTINGS / SYSTEM CONFIGURATION
  # ============================================================

  Branch:
    id: uuid primary
    code: string:30 unique
    name: string:120
    phone: string:40 nullable
    email: string:120 nullable
    address: text nullable
    is_head_office: boolean default:false
    is_transaction_enabled: boolean default:true
    is_pos_enabled: boolean default:true
    is_warehouse_enabled: boolean default:true
    is_ai_enabled: boolean default:true
    is_billing_location_enabled: boolean default:true
    abbreviated_tax_enabled: boolean default:true
    track_location: boolean default:true
    logo: string:255 nullable
    favicon: string:255 nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: BankAccount, Warehouse, CashTransfer, ChequeRegister, JournalVoucher, WarehouseTransfer, InventoryAdjustment, Quotation, SalesOrder, ProformaInvoice, Invoice, CustomerPayment, SalesReturn, PurchaseOrder, PurchaseBill, Expense, DebitNote, SupplierPayment, User, Attendance, LeaveApplication, Payslip

  Currency:
    id: uuid primary
    code: string:10 unique
    name: string:80
    symbol: string:20 nullable
    decimal_places: unsignedTinyInteger default:2
    is_base: boolean default:false
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: Account, BankAccount, CashTransfer, JournalVoucher, Quotation, SalesOrder, ProformaInvoice, Invoice, CustomerPayment, SalesReturn, PurchaseOrder, PurchaseBill, Expense, DebitNote, SupplierPayment

  AppSetting:
    id: uuid primary
    company_name: string:180
    tag_line: string:200 nullable
    address: string:255 nullable
    phone: string:40 nullable
    email: string:120 nullable
    website: string:180 nullable
    footer: text nullable
    logo: string:255 nullable
    suggest_selling: enum:recent,fixed default:recent
    negative_cash_balance: enum:reject,warn,do_nothing default:warn
    negative_item_balance: enum:reject,warn,do_nothing default:warn
    credit_limit_exceed: enum:reject,warn,do_nothing default:warn
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  ApplicationSetting:
    id: uuid primary
    key: string:120
    value: longtext nullable
    group: string:80 nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  GeneralSetting:
    id: uuid primary
    key: string:120
    value: longtext nullable
    group: string:80 nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  MasterData:
    id: uuid primary
    type: enum:custom_status,lead_source,deal_stage,task_type,credit_term,cost_term,payment_mode,tds_type,industry,activity_type,lost_reason
    group: string:80
    key: string:120
    value: string:180
    meta: json nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  AlertType:
    id: uuid primary
    name: string:150
    medium: enum:email,sms,whatsapp,in_app default:in_app
    alert_type: string:80 nullable
    schedule: enum:immediate,daily,weekly,monthly default:immediate
    sync_time: time nullable
    recipient: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  ReportingTag:
    id: uuid primary
    name: string:80
    color: string:20 nullable
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: ReportingTagLine

  ReportingTagLine:
    id: uuid primary
    reporting_tag_id: uuid foreign:reporting_tags.id
    name: string:80
    color: string:20 nullable
    sort_order: unsignedSmallInteger default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: ReportingTag

  DocumentNumbering:
    id: uuid primary
    document_type: enum:cash_transfer,credit_note,debit_note,expense,inventory_adjustment,invoice,journal_voucher,payment,production_journal,production_order,purchase_bill,purchase_order,quotation,receipt,sales_order,sales_return,warehouse_transfer,payroll,deduction,increment,contact,lead,deal,product,bank_account,capital,cash,current_asset,current_liability,direct_expense,direct_income,indirect_expense,indirect_income,non_current_asset,non_current_liability,reserve_surplus,loan_account,loan_topup,loan_charge
    prefix: string:20 nullable
    next_number: unsignedBigInteger default:1
    type_of_account: enum:auto_numbering,manual_numbering default:auto_numbering
    reset_every_fiscal_year: boolean default:false
    add_fiscal_year_in_code: boolean default:false
    enable_fiscal_year_next_number: boolean default:false
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  PrintingTemplate:
    id: uuid primary
    name: string:120
    document_type: string:80
    template_html: longtext nullable
    template_css: longtext nullable
    is_default: boolean default:false
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  CustomTemplate:
    id: uuid primary
    name: string:120
    purpose: string:80 nullable
    content: longtext nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  Announcement:
    id: uuid primary
    title: string:200
    description: text
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  EmailConfig:
    id: uuid primary
    email_config_name: string:120
    email_host: string:150
    email_port: string:20
    email_user: string:150
    email_pass: string:255
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  Email:
    id: uuid primary
    sender_email: string:150
    receiver_email: string:150
    subject: string:255 nullable
    body: longtext nullable
    email_status: string:30 nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

  CustomField:
    id: uuid primary
    name: string:120
    key: string:120 unique
    field_type: enum:text,textarea,number,decimal,date,datetime,time,select,multiselect,checkbox,radio,email,phone,url,file,boolean
    placeholder: string:180 nullable
    help_text: string:255 nullable
    default_value: string:255 nullable
    is_required: boolean default:false
    sort_order: unsignedSmallInteger default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: CustomFieldChoice, CustomFieldValidation, CustomFieldModule, CustomFieldValue

  CustomFieldChoice:
    id: uuid primary
    custom_field_id: uuid foreign:custom_fields.id
    label: string:120
    value: string:120
    color: string:20 nullable
    sort_order: unsignedSmallInteger default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: CustomField

  CustomFieldValidation:
    id: uuid primary
    custom_field_id: uuid foreign:custom_fields.id
    rule: enum:min,max,min_length,max_length,regex,email,url,numeric,integer,decimal,date,before,after,in,not_in
    value: string:255 nullable
    message: string:255 nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: CustomField

  CustomFieldModule:
    id: uuid primary
    custom_field_id: uuid foreign:custom_fields.id
    module: enum:sales_invoice,quotation,sales_order,credit_note,customer_payment,quick_receipt,purchase_order,purchase_bill,expense,debit_note,supplier_payment,quick_payment,journal_voucher,cash_transfer,production_order,production_journal,contact,lead,deal,crm_activity,product,employee,project
    active: boolean default:true
    relationships:
      belongsTo: CustomField

  CustomFieldValue:
    id: uuid primary
    custom_field_id: uuid foreign:custom_fields.id
    module: enum:sales_invoice,quotation,sales_order,credit_note,customer_payment,quick_receipt,purchase_order,purchase_bill,expense,debit_note,supplier_payment,quick_payment,journal_voucher,cash_transfer,production_order,production_journal,contact,lead,deal,crm_activity,product,employee,project
    record_id: uuid
    value: longtext nullable
    value_json: json nullable
    relationships:
      belongsTo: CustomField
    indexes:
      - unique: custom_field_id, module, record_id

  # ============================================================
  # ACCOUNTING / FINANCE
  # ============================================================

  Account:
    id: uuid primary
    name: string:120
    code: string:30 nullable
    nature: enum:actor,coa,bank,cash,employee default:coa
    parent_id: uuid foreign:accounts.id nullable
    currency_id: uuid foreign:currencies.id nullable
    swift_code: string:50 nullable
    dr_amount: decimal:16,2 default:0
    cr_amount: decimal:16,2 default:0
    balance: decimal:16,2 default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Account:parent, Currency
      hasMany: Account:children, Contact, BankAccount, ChartOfAccount, CashTransfer:from_transfers, CashTransferLine:to_transfer_lines, ChequeRegister:cheque_accounts, ChequeRegister:related_cheque_accounts, CustomerPayment, SupplierPayment

  ChartOfAccount:
    id: uuid primary
    account_id: uuid foreign:accounts.id
    branch_id: uuid foreign:branches.id nullable
    type: enum:asset,liability,equity,income,expense default:asset
    code: string:30 unique nullable
    name: string:150
    parent_id: uuid foreign:chart_of_accounts.id nullable
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Account, Branch, ChartOfAccount:parent
      hasMany: ChartOfAccount:children, JournalVoucherLine, ExpenseLine, CustomerPayment:bank_charge_payments, CustomerPayment:tds_payments, SupplierPayment:bank_charge_payments, SupplierPayment:tds_payments, TaxRateComponent

  BankAccount:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    type: enum:bank,cash
    display_name: string:150
    code: string:30
    currency_id: uuid foreign:currencies.id
    description: text nullable
    bank_name: string:150 nullable
    account_name: string:150 nullable
    account_number: string:80 nullable
    account_type: string:50 nullable
    swift_code: string:50 nullable
    account_id: uuid foreign:accounts.id nullable
    opening_balance: decimal:16,2 default:0
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Currency, Account

  CashTransfer:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    transfer_no: string:40 unique nullable
    transfer_date: date
    from_account_id: uuid foreign:accounts.id
    reference: string:120 nullable
    currency_id: uuid foreign:currencies.id
    total_amount: decimal:16,2 default:0
    notes: text nullable
    status: enum:draft,posted,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Account:from_account, Currency
      hasMany: CashTransferLine

  CashTransferLine:
    id: uuid primary
    cash_transfer_id: uuid foreign:cash_transfers.id
    to_account_id: uuid foreign:accounts.id
    exchange_rate_to_default: decimal:16,6 default:1
    amount: decimal:16,2 default:0
    description: string:200 nullable
    relationships:
      belongsTo: CashTransfer, Account:to_account

  ChequeRegister:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    cheque_no: string:80
    cheque_date: date
    issued_date: date
    received_date: date nullable
    payee_name: string:150 nullable
    cleared_date: date nullable
    direction: enum:issued,received default:issued
    account_id: uuid foreign:accounts.id
    related_account_id: uuid foreign:accounts.id nullable
    receiver_related_account_id: uuid foreign:accounts.id nullable
    amount: decimal:16,2 default:0
    status: enum:pending,cleared,bounced,cancelled default:pending
    notes: text nullable
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Account:account, Account:related_account, Account:receiver_related_account

  JournalVoucher:
    id: uuid primary
    branch_id: uuid foreign:branches.id nullable
    voucher_no: string:40 unique nullable
    voucher_date: date
    currency_id: uuid foreign:currencies.id nullable
    reference: string:120 nullable
    narration: text nullable
    status: enum:draft,posted,cancelled default:draft
    active: boolean default:true
    approved: boolean default:false
    approved_at: datetime nullable
    approved_by_id: id foreign:users.id nullable
    void: boolean default:false
    voided_by_id: id foreign:users.id nullable
    voided_reason: text nullable
    voided_at: datetime nullable
    exchange_rate: decimal:18,6 default:1
    total: decimal:18,6 default:0
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Branch, Currency
      hasMany: JournalVoucherLine

  JournalVoucherLine:
    id: uuid primary
    journal_voucher_id: uuid foreign:journal_vouchers.id
    chart_of_account_id: uuid foreign:chart_of_accounts.id
    description: string:200 nullable
    debit: decimal:16,2 default:0
    credit: decimal:16,2 default:0
    relationships:
      belongsTo: JournalVoucher, ChartOfAccount
  


  LoanAccount:
    id: uuid primary
    name: string:150
    bank_name: string:150 nullable
    loan_number: string:80 nullable
    description: text nullable

    opening_balance: decimal:18,6 default:0
    current_balance: decimal:18,6 default:0
    balance_as_of: date nullable

    loan_received_in_account_id: uuid foreign:accounts.id nullable
    related_account_id: uuid foreign:accounts.id nullable

    interest_rate_per_annum: decimal:8,4 default:0
    duration_in_month: unsignedSmallInteger default:0

    processing_fee: decimal:18,6 default:0
    processing_fee_paid_from_account_id: uuid foreign:accounts.id nullable

    status: enum:active,closed,settled,cancelled default:active
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

    relationships:
      belongsTo: Account:loan_received_in_account, Account:related_account, Account:processing_fee_paid_from_account
      hasMany: LoanTopUp, LoanCharge

  LoanTopUp:
    id: uuid primary
    loan_account_id: uuid foreign:loan_accounts.id
    topup_date: date
    loan_received_in_account_id: uuid foreign:accounts.id
    amount: decimal:18,6 default:0
    reference: string:120 nullable
    notes: text nullable

    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

    relationships:
      belongsTo: LoanAccount, Account:loan_received_in_account

  LoanCharge:
    id: uuid primary
    loan_account_id: uuid foreign:loan_accounts.id
    charge_name: string:150
    charge_date: date
    amount: decimal:18,6 default:0
    charges_paid_from_account_id: uuid foreign:accounts.id nullable
    reference: string:120 nullable
    notes: text nullable

    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable

    relationships:
      belongsTo: LoanAccount, Account:charges_paid_from_account

  # ============================================================
  # CRM / CONTACTS / LEADS / DEALS / ACTIVITIES
  # ============================================================

  ContactGroup:
    id: uuid primary
    name: string:120
    parent_id: uuid foreign:contact_groups.id nullable
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: ContactGroup:parent
      hasMany: Contact, ContactGroup:children

  CreditTerm:
    id: uuid primary
    name: string:120
    days: unsignedSmallInteger default:0
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: Contact, Quotation, PurchaseOrder

  Contact:
    id: uuid primary
    contact_group_id: uuid foreign:contact_groups.id nullable
    account_id: uuid foreign:accounts.id nullable
    contact_type: enum:customer,supplier,lead default:customer
    tax_registration_no: string:80 nullable
    tax_registration_type: enum:pan,vat,gstin,tan,ein,sales_tax_permit,state_tax_id,none default:none
    name: string:180
    code: string:50 nullable
    address: text nullable
    pan: string:80 nullable
    phone: string:40 nullable
    email: string:120 nullable
    accept_purchase: boolean default:false
    credit_term_id: uuid foreign:credit_terms.id nullable
    credit_limit: decimal:16,2 default:0 nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: ContactGroup, Account, CreditTerm
      hasMany: Lead, Deal, CrmActivity, TaxExemption, Quotation, Invoice, SalesOrder, ProformaInvoice, CustomerPayment, SalesReturn, PurchaseOrder, PurchaseBill, Expense, DebitNote, SupplierPayment

  Lead:
    id: uuid primary
    lead_no: string:40 unique nullable
    contact_id: uuid foreign:contacts.id nullable
    assigned_to_id: id foreign:users.id nullable
    converted_contact_id: uuid foreign:contacts.id nullable
    converted_deal_id: uuid foreign:deals.id nullable
    name: string:180
    company_name: string:180 nullable
    email: string:120 nullable
    phone: string:40 nullable
    mobile: string:40 nullable
    website: string:180 nullable
    address: text nullable
    city: string:80 nullable
    state: string:80 nullable
    country: string:80 nullable
    lead_source: string:80 nullable
    industry: string:120 nullable
    expected_value: decimal:16,2 default:0
    status: enum:new,contacted,qualified,unqualified,converted,lost default:new
    priority: enum:low,medium,high,urgent default:medium
    next_follow_up_date: datetime nullable
    last_contacted_at: datetime nullable
    notes: text nullable
    converted_at: datetime nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Contact, User:assigned_to, Contact:converted_contact, Deal:converted_deal
      hasMany: Deal, CrmActivity

  DealPipeline:
    id: uuid primary
    name: string:120
    description: text nullable
    is_default: boolean default:false
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: DealStage, Deal

  DealStage:
    id: uuid primary
    deal_pipeline_id: uuid foreign:deal_pipelines.id
    name: string:120
    color: string:20 nullable
    probability: unsignedTinyInteger default:0
    sort_order: unsignedSmallInteger default:0
    is_won_stage: boolean default:false
    is_lost_stage: boolean default:false
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: DealPipeline
      hasMany: Deal

  Deal:
    id: uuid primary
    deal_no: string:40 unique nullable
    lead_id: uuid foreign:leads.id nullable
    contact_id: uuid foreign:contacts.id nullable
    deal_pipeline_id: uuid foreign:deal_pipelines.id nullable
    deal_stage_id: uuid foreign:deal_stages.id nullable
    assigned_to_id: id foreign:users.id nullable
    title: string:180
    amount: decimal:16,2 default:0
    expected_close_date: date nullable
    closed_date: date nullable
    probability: unsignedTinyInteger default:0
    source: string:80 nullable
    priority: enum:low,medium,high,urgent default:medium
    status: enum:open,won,lost,cancelled default:open
    lost_reason: string:255 nullable
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Lead, Contact, DealPipeline, DealStage, User:assigned_to
      hasMany: CrmActivity

  CrmActivity:
    id: uuid primary
    lead_id: uuid foreign:leads.id nullable
    deal_id: uuid foreign:deals.id nullable
    contact_id: uuid foreign:contacts.id nullable
    assigned_to_id: id foreign:users.id nullable
    activity_type: enum:call,email,meeting,task,note,whatsapp,sms,follow_up default:task
    subject: string:180
    description: text nullable
    due_at: datetime nullable
    completed_at: datetime nullable
    status: enum:pending,in_progress,completed,cancelled default:pending
    priority: enum:low,medium,high,urgent default:medium
    outcome: string:255 nullable
    next_follow_up_at: datetime nullable
    reminder_at: datetime nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: Lead, Deal, Contact, User:assigned_to
      hasMany: CrmActivityComment

  CrmActivityComment:
    id: uuid primary
    crm_activity_id: uuid foreign:crm_activities.id
    user_id: id foreign:users.id nullable
    comment: text
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: CrmActivity, User

  # ============================================================
  # TAX MASTER - NEPAL / INDIA / USA READY
  # ============================================================

  TaxJurisdiction:
    id: uuid primary
    country_code: enum:NP,IN,US
    state_code: string:20 nullable
    county_name: string:120 nullable
    city_name: string:120 nullable
    name: string:150
    code: string:50 nullable
    tax_system: enum:nepal_vat,india_gst,usa_sales_tax,withholding,custom
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: TaxRegistration, TaxClass, TaxRate, TaxRule

  TaxRegistration:
    id: uuid primary
    tax_jurisdiction_id: uuid foreign:tax_jurisdictions.id nullable
    registration_type: enum:pan,vat,gstin,tan,ein,sales_tax_permit,state_tax_id
    registration_no: string:80
    legal_name: string:180 nullable
    effective_from: date nullable
    effective_to: date nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      belongsTo: TaxJurisdiction

  ProductTaxCategory:
    id: uuid primary
    country_code: enum:NP,IN,US
    code: string:80
    name: string:180
    tax_category_type: enum:goods,service,expense,exempt,zero_rated,non_taxable
    hsn_sac_code: string:30 nullable
    description: text nullable
    active: boolean default:true
    is_system_generated: boolean default:false
    user_add_id: id foreign:users.id nullable
    relationships:
      hasMany: Product, TaxRule, TaxExemption

  TaxClass:
    id: uuid primary
    tax_jurisdiction_id: uuid foreign:tax_jurisdictions.id nullable
    country_code: enum:NP,IN,US
